server {
    listen 80;
    server_name tatidzufri.com www.tatidzufri.com;

    location / {
        include proxy_params;
        proxy_pass http://unix:/home/tatiana/site/portfolio.sock;
    }

    location /static {
        alias /home/tatiana/site/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
